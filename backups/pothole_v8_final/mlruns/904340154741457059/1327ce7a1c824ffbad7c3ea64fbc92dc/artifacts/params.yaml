# =============================================================================
# params.yaml — Versioned Pipeline Parameters
# Tracked by both Git and DVC so every experiment is fully reproducible.
# Change values here before running a new experiment version.
# =============================================================================

# ─── Dataset ──────────────────────────────────────────────────────────────────
data:
  version: "v8"                          # memory-safe config
  source: "roboflow"
  workspace: "learning-v1all"            # Potholes Roboflow workspace
  project: "potholes-detection-fwhfx"    # Potholes Roboflow project
  roboflow_version: 2                    # version on Roboflow
  format: "yolov8"
  classes:
    - pothole

# ─── Split ────────────────────────────────────────────────────────────────────
split:
  seed: 42          # fixed seed → same split every run
  train_ratio: 0.80
  val_ratio: 0.20
  max_images: 400   # safe limit for low-RAM laptop

# ─── Training ─────────────────────────────────────────────────────────────────
train:
  model: "yolov8n.pt"        # nano model — fast on CPU
  epochs: 30                # reduced — early stop will cut this further
  batch_size: 4             # ⬇ halved to save RAM
  image_size: 320           # ⬇ 640→320 saves 4x memory (biggest impact!)
  learning_rate: 0.01
  patience: 5               # early stopping patience
  device: "cpu"
  workers: 0                # ⬇ 0 workers = no extra RAM for dataloaders

# ─── MLflow ───────────────────────────────────────────────────────────────────
mlflow:
  experiment_name: "road-detection"
  tracking_uri: "mlruns"     # local folder; change to http://... for remote server

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  splits_dir: "data/splits"
  models_dir: "models"
  dataset_yaml: "configs/dataset.yaml"
